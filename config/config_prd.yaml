root_dir: .


paths:
  data_pdfs: data_prd/data_ingestion/NIH_all
  index_dir: data_prd/vector_db/DMPtools_db
  excel_path: data_prd/inputs/inputs.xlsx
  output_md: data_prd/outputs/markdown
  output_docx: data_prd/outputs/docx

rag:
  enabled: true
  index_mode: "load"
  chunk_size: 900
  chunk_overlap: 150
  retriever_top_k: 6
  vector_db_mode: "load"   # load | build
  hf_repo: "XXX"
  hf_zip: "vector_db.zip"

models:
  llm_name: llama3:8b  
  llm_host: http://ollama:11434
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  pdf_load_workers: 8
  embedding_device: cuda
  embedding_batch_size: 128
  normalize_embeddings: true
  hf_cache_dir: data_prd/cache/hf
  # Set false for first run to download, then true for offline reuse
  local_files_only: true
  allow_download_if_missing: true
